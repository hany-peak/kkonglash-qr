<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KKONG LASH · QR</title>
<style>
  :root {
    --bg: #f2f4f6;
    --card: #ffffff;
    --text: #191f28;
    --sub: #8b95a1;
    --line: #e5e8eb;
    --primary: #3182f6;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0f1115; --card: #ffffff; }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.04);
    text-align: center;
  }
  .hero {
    width: 100%;
    display: block;
    border-bottom: 1px solid var(--line);
  }
  .body { padding: 26px 28px 28px; }
  .brand {
    height: 24px;
    margin: 2px auto 6px;
    display: block;
  }
  .tagline {
    font-size: 13px;
    color: var(--sub);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin: 0 0 20px;
  }
  .qr-wrap {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 16px;
    display: inline-block;
    line-height: 0;
  }
  #qr { width: 240px; height: 240px; display: block; }
  .scan-hint { font-size: 15px; font-weight: 600; margin: 18px 0 2px; }
  .scan-sub { font-size: 13px; color: var(--sub); margin: 0 0 18px; }
  /* Language strip banner (between logo image and hero) — one row */
  .langs {
    display: flex;
    flex-wrap: nowrap;
    justify-content: center;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    background: #fafbfc;
    border-bottom: 1px solid var(--line);
  }
  .lang {
    flex: 1 1 0;
    min-width: 0;
    max-width: 38px;
    height: 30px;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 8px;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    transition: border-color .12s ease, background-color .12s ease, transform .04s ease;
  }
  .lang:active { transform: scale(0.92); }
  .lang.active {
    border-color: var(--primary);
    background: #eaf2fe;
    box-shadow: 0 0 0 1px var(--primary) inset;
  }
  .feed-track {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 10px 14px 12px;
    border-bottom: 1px solid var(--line);
  }
  .feed-track::-webkit-scrollbar { display: none; }
  .feed-item {
    flex: 0 0 46%;
    aspect-ratio: 4 / 5;
    scroll-snap-align: center;
    border-radius: 14px;
    overflow: hidden;
    background: #f2f4f6;
    border: 0;
    padding: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .feed-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  /* Lightbox popup */
  .lb {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0, 0, 0, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: pan-y;
  }
  .lb[hidden] { display: none; }
  .lb-img {
    max-width: 92vw;
    max-height: 84vh;
    object-fit: contain;
    border-radius: 8px;
    user-select: none;
    -webkit-user-drag: none;
  }
  .lb button {
    position: absolute;
    background: rgba(255, 255, 255, 0.14);
    color: #fff;
    border: 0;
    cursor: pointer;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }
  .lb-close { top: 14px; right: 16px; width: 44px; height: 44px; border-radius: 50%; font-size: 26px; }
  .lb-prev, .lb-next {
    top: 50%; transform: translateY(-50%);
    width: 52px; height: 52px; border-radius: 50%; font-size: 30px;
  }
  .lb-prev { left: 12px; }
  .lb-next { right: 12px; }
  .lb-count {
    position: absolute; bottom: 18px; left: 0; right: 0;
    text-align: center; color: #fff; font-size: 13px; letter-spacing: 0.04em;
  }
  @media (max-width: 480px) {
    .lb-prev, .lb-next { width: 44px; height: 44px; font-size: 26px; }
  }
  .foot {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    font-size: 12px;
    color: var(--sub);
    word-break: break-all;
  }
  .foot a { color: var(--primary); text-decoration: none; font-weight: 600; }
</style>
</head>

var FEED_COUNT = 40;    // number of feed images in feed/ and feed/thumb/
var AUTO_MS = 2600;     // carousel auto-advance interval
var QUIET = 4;          // QR quiet zone (modules)
var RENDER_PX = 1200;   // hi-res render size
var LOGO_WIDTH_RATIO = 0.46; // logo width vs QR width
var DARK = '#111111';

function drawQR(ctx, size) {
  var total = COUNT + QUIET * 2;
  var cell = size / total;
  ctx.fillStyle = LIGHT;
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = DARK;
  for (var r = 0; r < COUNT; r++) {
    for (var c = 0; c < COUNT; c++) {
      if (qr.isDark(r, c)) {
        var x = (c + QUIET) * cell;
        var y = (r + QUIET) * cell;
        ctx.fillRect(Math.floor(x), Math.floor(y), Math.ceil(cell) + 1, Math.ceil(cell) + 1);
      }
    }
  }
}

    lx: (size - lw) / 2, ly: (size - lh) / 2,
    r: Math.min(boxW, boxH) * 0.28
  };
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawLogo(ctx, size) {
  if (!logoReady) return;
  var b = logoBox(size);
  ctx.fillStyle = LIGHT;
  roundRect(ctx, b.bx, b.by, b.bw, b.bh, b.r);
  ctx.fill();
  ctx.drawImage(logoImg, b.lx, b.ly, b.lw, b.lh);
}

function renderCanvas() {
  var canvas = document.getElementById('qr');
  canvas.width = RENDER_PX;
  canvas.height = RENDER_PX;
  var ctx = canvas.getContext('2d');
  drawQR(ctx, RENDER_PX);
  drawLogo(ctx, RENDER_PX);
}

// ── i18n ───────────────────────────────────────────────────────
// Same 8 languages as the KKONG LASH inpock page. QR/link stay the
// global link; only the on-screen copy changes.
var LANGS = [
  { code: 'en', flag: '🇺🇸', label: 'English' },
  { code: 'it', flag: '🇮🇹', label: 'Italiano' },
  { code: 'es', flag: '🇪🇸', label: 'Español' },
  { code: 'de', flag: '🇩🇪', label: 'Deutsch' },
  { code: 'fr', flag: '🇫🇷', label: 'Français' },
  { code: 'zh', flag: '🇨🇳', label: '中文' },
  { code: 'ja', flag: '🇯🇵', label: '日本語' },
  { code: 'ko', flag: '🇰🇷', label: '한국어' }
];

var I18N = {
  en: { tagline: 'Global Lash Brand',   hint: 'Scan the QR code',        sub: 'Scan to visit the KKONG LASH page',       open: 'Open link →' },
  it: { tagline: 'Brand di Ciglia Globale', hint: 'Scansiona il codice QR', sub: 'Scansiona per visitare la pagina KKONG LASH', open: 'Apri il link →' },
  es: { tagline: 'Marca Global de Pestañas', hint: 'Escanea el código QR', sub: 'Escanea para visitar la página de KKONG LASH', open: 'Abrir enlace →' },
  de: { tagline: 'Globale Wimpernmarke', hint: 'QR-Code scannen',        sub: 'Scannen, um die KKONG LASH Seite zu öffnen', open: 'Link öffnen →' },
  fr: { tagline: 'Marque de Cils Mondiale', hint: 'Scannez le code QR',  sub: 'Scannez pour visiter la page KKONG LASH', open: 'Ouvrir le lien →' },
  zh: { tagline: '全球美睫品牌',          hint: '扫描二维码',              sub: '扫描前往 KKONG LASH 页面',                open: '打开链接 →' },
  ja: { tagline: 'グローバル ラッシュ ブランド', hint: 'QRコードをスキャン', sub: 'スキャンして KKONG LASH ページへ',        open: 'リンクを開く →' },
  ko: { tagline: '글로벌 래쉬 브랜드',    hint: 'QR 코드를 스캔하세요',    sub: '스캔하면 KKONG LASH 페이지로 이동합니다', open: '링크 열기 →' }
};

var currentLang = 'en';

function applyLang(code) {
  if (!I18N[code]) code = 'en';
  currentLang = code;
  var t = I18N[code];
  document.documentElement.lang = code;
  document.getElementById('tagline').textContent = t.tagline;
  document.getElementById('scanHint').textContent = t.hint;
  document.getElementById('scanSub').textContent = t.sub;
  var btns = document.querySelectorAll('.lang');
  for (var i = 0; i < btns.length; i++) {
    var on = btns[i].getAttribute('data-code') === code;
    btns[i].classList.toggle('active', on);
    btns[i].setAttribute('aria-pressed', on ? 'true' : 'false');
  }
}

function buildLangButtons() {
  var box = document.getElementById('langs');
  LANGS.forEach(function (l) {
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'lang';
    b.textContent = l.flag;
    b.setAttribute('data-code', l.code);
    b.setAttribute('aria-label', l.label);
    // click fires on tap (mobile/iPad) and mouse click alike
    b.addEventListener('click', function () { applyLang(l.code); });
    box.appendChild(b);
  });
}

function defaultLang() {
  var nav = (navigator.language || 'en').slice(0, 2).toLowerCase();
  return I18N[nav] ? nav : 'en';
}

// ── Feed carousel (auto-advance) + lightbox popup ──────────────
function pad2(n) { return (n < 10 ? '0' : '') + n; }
function feedThumb(i) { return 'feed/thumb/feed-' + pad2(i) + '.jpg'; }
function feedFull(i) { return 'feed/feed-' + pad2(i) + '.jpg'; }

var track, autoTimer = null, curSlide = 0;

function buildFeed() {
  track = document.getElementById('feedTrack');
  for (var i = 1; i <= FEED_COUNT; i++) {
    (function (n) {
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'feed-item';
      b.setAttribute('aria-label', 'Feed ' + n);
      var img = new Image();
      img.loading = 'lazy';
      img.src = feedThumb(n);
      img.alt = 'KKONG LASH feed ' + n;
      b.appendChild(img);
      b.addEventListener('click', function () { openLightbox(n); });
      track.appendChild(b);
    })(i);
  }
}

function nearestIndex() {
  var items = track.children, center = track.scrollLeft + track.clientWidth / 2;
  var best = 0, bd = Infinity;
  for (var i = 0; i < items.length; i++) {
    var mid = items[i].offsetLeft + items[i].clientWidth / 2;
    var d = Math.abs(mid - center);
    if (d < bd) { bd = d; best = i; }
  }
  return best;
}

function slideTo(i) {
  var items = track.children;
  if (!items.length) return;
  curSlide = (i % items.length + items.length) % items.length;
  var el = items[curSlide];
  var left = el.offsetLeft - (track.clientWidth - el.clientWidth) / 2;
  track.scrollTo({ left: left, behavior: 'smooth' });
}

function startAuto() { stopAuto(); autoTimer = setInterval(function () { slideTo(curSlide + 1); }, AUTO_MS); }
function stopAuto() { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; } }

function bindCarousel() {
  // pause while the user is touching/dragging, resume from where they left off
  var resume;
  track.addEventListener('pointerdown', function () { stopAuto(); clearTimeout(resume); });
  var onEnd = function () {
    clearTimeout(resume);
    resume = setTimeout(function () { curSlide = nearestIndex(); startAuto(); }, 2500);
  };
  track.addEventListener('pointerup', onEnd);
  track.addEventListener('pointercancel', onEnd);
  track.addEventListener('mouseleave', onEnd);
  track.addEventListener('touchend', onEnd);
}

// ── Lightbox ───────────────────────────────────────────────────
var lbEl, lbImg, lbCount, lbIndex = 1;

function showLb() {
  lbImg.src = feedFull(lbIndex);
  lbCount.textContent = lbIndex + ' / ' + FEED_COUNT;
}
function openLightbox(i) {
  lbIndex = i;
  showLb();
  lbEl.hidden = false;
  document.body.style.overflow = 'hidden';
  stopAuto();
}
function closeLb() {
  lbEl.hidden = true;
  document.body.style.overflow = '';
  startAuto();
}
function lbGo(delta) {
  lbIndex = ((lbIndex - 1 + delta) % FEED_COUNT + FEED_COUNT) % FEED_COUNT + 1;
  showLb();
}

function bindLightbox() {
  lbEl = document.getElementById('lb');
  lbImg = document.getElementById('lbImg');
  lbCount = document.getElementById('lbCount');
  document.getElementById('lbClose').addEventListener('click', closeLb);
  document.getElementById('lbPrev').addEventListener('click', function () { lbGo(-1); });
  document.getElementById('lbNext').addEventListener('click', function () { lbGo(1); });
  // tap on the dark backdrop (not image/buttons) closes
  lbEl.addEventListener('click', function (e) { if (e.target === lbEl) closeLb(); });
  // keyboard (desktop)
  document.addEventListener('keydown', function (e) {
    if (lbEl.hidden) return;
    if (e.key === 'Escape') closeLb();
    else if (e.key === 'ArrowLeft') lbGo(-1);
    else if (e.key === 'ArrowRight') lbGo(1);
  });
  // swipe (mobile/iPad)
  var sx = 0, sy = 0;
  lbEl.addEventListener('touchstart', function (e) { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, { passive: true });
  lbEl.addEventListener('touchend', function (e) {
    var dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)) lbGo(dx < 0 ? 1 : -1);
  }, { passive: true });
}

function init() {
  buildLangButtons();
  applyLang(defaultLang());

  buildFeed();
  bindCarousel();
  bindLightbox();
  startAuto();

  logoImg.onload = function () { logoReady = true; renderCanvas(); };
  logoImg.onerror = function () { logoReady = false; renderCanvas(); };
  logoImg.src = LOGO_SRC;
  renderCanvas(); // first paint before logo loads
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

</script>
